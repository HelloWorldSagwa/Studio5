<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="robots" content="noindex, nofollow">
    <title>결제선언 코드 활성화</title>
    <link rel="preconnect" href="https://esm.sh">
    <link rel="stylesheet" href="activate.css">
</head>
<body>
    <main class="activation-shell">
        <section class="activation-card" aria-labelledby="page-title">
            <div class="brand">
                <div class="app-mark" aria-hidden="true">✦</div>
                <p class="brand-name">결제선언</p>
            </div>

            <div id="loading-view" class="state-view" aria-live="polite">
                <div class="spinner" aria-hidden="true"></div>
                <p>계정 정보를 확인하고 있어요.</p>
            </div>

            <div id="login-view" class="state-view" hidden>
                <header class="page-header">
                    <p class="eyebrow">프로모션 코드</p>
                    <h1 id="page-title">이용권을 활성화하세요</h1>
                    <p>앱에서 사용한 로그인 방식으로 로그인해 주세요.<br>로그인한 한 계정에만 이용권이 적용됩니다.</p>
                </header>

                <div class="login-actions">
                    <button id="apple-login" class="provider-button apple-button" type="button">
                        Apple로 계속하기
                    </button>
                    <button id="kakao-login" class="provider-button kakao-button" type="button">
                        <span class="kakao-symbol" aria-hidden="true"></span>
                        카카오로 계속하기
                    </button>
                </div>
            </div>

            <div id="activation-view" class="state-view" hidden>
                <header class="page-header">
                    <p class="eyebrow">코드 활성화</p>
                    <h1>코드를 입력해 주세요</h1>
                    <p>활성화할 결제선언 계정이 맞는지 확인해 주세요.</p>
                </header>

                <div class="account-summary">
                    <div>
                        <span class="summary-label">로그인 계정</span>
                        <strong id="account-name">결제선언 사용자</strong>
                    </div>
                    <span id="account-provider" class="provider-pill"></span>
                </div>

                <form id="activation-form" novalidate>
                    <label for="promotion-code">프로모션 코드</label>
                    <input
                        id="promotion-code"
                        name="promotion-code"
                        type="text"
                        inputmode="text"
                        autocomplete="one-time-code"
                        autocapitalize="characters"
                        spellcheck="false"
                        maxlength="30"
                        placeholder="PD-XXXX-XXXX-XXXX-XXXX-XXXX"
                        required
                    >
                    <p id="form-message" class="form-message" role="alert" hidden></p>
                    <button id="activate-button" class="primary-button" type="submit">코드 활성화</button>
                </form>

                <button class="logout-button" type="button" data-logout>로그아웃</button>
            </div>

            <div id="success-view" class="state-view" hidden>
                <div class="success-icon" aria-hidden="true">✓</div>
                <header class="page-header success-header">
                    <p class="eyebrow">활성화 완료</p>
                    <h1>이용권이 활성화됐어요</h1>
                    <p id="success-description">이제 결제선언 앱에서 이용할 수 있어요.</p>
                </header>
                <div id="supporter-badge" class="supporter-badge" hidden>
                    <span aria-hidden="true">★</span>
                    창립 후원자 혜택이 적용됐어요
                </div>
                <button class="logout-button prominent" type="button" data-logout>로그아웃</button>
            </div>

            <div id="fatal-error" class="state-view" hidden>
                <header class="page-header">
                    <p class="eyebrow error-eyebrow">연결 오류</p>
                    <h1>페이지를 불러오지 못했어요</h1>
                    <p id="fatal-error-message">잠시 후 다시 시도해 주세요.</p>
                </header>
                <button id="retry-button" class="primary-button" type="button">다시 시도</button>
            </div>
        </section>

        <footer class="activation-footer">
            <a href="../terms.html">이용약관</a>
            <span>·</span>
            <a href="../privacy.html">개인정보처리방침</a>
        </footer>
    </main>

    <script src="config.js"></script>
    <script type="module" src="activate.js"></script>
</body>
</html>
