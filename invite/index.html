<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>결제선언 동료 초대</title>
  <style>
    :root {
      color-scheme: light;
      --brand: #0a8cff;
      --brand-pressed: #0072d9;
      --disabled: #c8cbd1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      padding:
        max(24px, env(safe-area-inset-top))
        24px
        max(24px, env(safe-area-inset-bottom));
      background: #fff;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    }

    .button {
      width: min(100%, 520px);
      min-height: 62px;
      border-radius: 18px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      padding: 0 24px;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 750;
      letter-spacing: -0.025em;
      -webkit-tap-highlight-color: transparent;
    }

    .button:active { background: var(--brand-pressed); }

    .button[aria-disabled="true"] {
      background: var(--disabled);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <a class="button" id="openApp" href="#">결제선언에서 동료로 참여하기</a>

  <script>
    (() => {
      const pathParts = location.pathname.split('/').filter(Boolean);
      const pathToken = pathParts[0] === 'invite' ? pathParts[1] : '';
      const queryToken = new URLSearchParams(location.search).get('token') || '';
      const token = decodeURIComponent(pathToken || queryToken).trim();
      const openApp = document.getElementById('openApp');

      if (!token) {
        openApp.removeAttribute('href');
        openApp.setAttribute('aria-disabled', 'true');
        openApp.textContent = '초대 링크를 다시 확인해주세요';
        return;
      }

      openApp.href = 'paymentdeclaration://invite?code=' + encodeURIComponent(token);
    })();
  </script>
</body>
</html>
